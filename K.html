<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By: Ghuy Space</title>
    <!-- Bộ icon Font Awesome để hiển thị biểu tượng nốt nhạc -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a1128 0%, #010409 100%);
            position: relative;
        }

        /* Nền vũ trụ lấp lánh xanh tím di chuyển cực đẹp của bạn */
        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-image: 
                radial-gradient(#ffffff, rgba(255,255,255,.6) 2px, transparent 40px),
                radial-gradient(#00f2fe, rgba(0,242,254,.3) 2.5px, transparent 45px),
                radial-gradient(#9b5de5, rgba(155,93,229,.3) 3px, transparent 50px),
                radial-gradient(#ffffff, rgba(255,255,255,.2) 1.5px, transparent 30px);
            background-size: 550px 550px, 450px 450px, 600px 600px, 350px 350px;
            opacity: 0.95;
            animation: spaceFlight 20s linear infinite;
        }

        @keyframes spaceFlight {
            from { background-position: 0 0, 150px 200px, 300px 400px, 80px 120px; }
            to { background-position: 550px 550px, 600px 650px, 900px 1000px, -270px 470px; }
        }

        /* Khung chứa hiệu ứng kính mờ trong suốt */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            max-width: 350px;
            width: 90%;
        }

        /* Vòng tròn Avatar chú mèo hiển thị bằng văn bản */
        .avatar-emoji {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 25px rgba(0, 242, 243, 0.6);
            margin: 0 auto 18px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px;
        }

        h1 { 
            color: #ffffff; 
            margin-bottom: 6px; 
            font-size: 26px; 
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        p { 
            color: rgba(255, 255, 255, 0.65); 
            font-size: 13px; 
            margin-bottom: 28px; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Các nút liên kết trong suốt hoàn toàn */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 16px 0;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 50px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn:active, .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }

        /* Nút Bật/Tắt nhạc Neon siêu đẹp */
        .btn-music {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #00f2fe, #9b5de5);
            border: none;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            margin-top: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-music:active {
            transform: scale(0.98);
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>

    <!-- Nhạc nền tự động nhận diện file nhac.mp3 bạn đã tải lên cùng thư mục trên GitHub -->
    <audio id="bgMusic" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="avatar-emoji">🐱</div>
        
        <h1>By: Ghuy</h1>
        <p>Welcome to my space</p>

        <a href="https://facebook.com" target="_blank" class="btn">Facebook</a>
        <a href="https://discord.gg" target="_blank" class="btn">Discord</a>
        <a href="https://tiktok.com" target="_blank" class="btn">Tiktok</a>

        <!-- Nút bấm thủ công ép Chrome xả khóa âm thanh -->
        <button class="btn-music" id="musicBtn" onclick="toggleMusic()">
            <i class="fas fa-music"></i> BẬT NHẠC NỀN
        </button>
    </div>

    <script>
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");

        function toggleMusic() {
            if (music.paused) {
                music.volume = 1.0; 
                music.play()
                    .then(() => {
                        btn.innerHTML = '<i class="fas fa-pause"></i> TẮT NHẠC NỀN';
                        btn.style.background = 'rgba(255,255,255,0.1)';
                        btn.style.border = '1px solid rgba(255,255,255,0.4)';
                        btn.style.boxShadow = 'none';
                    })
                    .catch(err => {
                        alert("Không thể tải file nhac.mp3. Bạn hãy kiểm tra lại tên file nhạc trên GitHub xem đã đúng là nhac.mp3 chưa nhé!");
                    });
            } else {
                music.pause();
                btn.innerHTML = '<i class="fas fa-music"></i> BẬT NHẠC NỀN';
                btn.style.background = 'linear-gradient(45deg, #00f2fe, #9b5de5)';
                btn.style.boxShadow = '0 0 20px rgba(0, 242, 254, 0.5)';
            }
        }
    </script>
</body>
</html>
